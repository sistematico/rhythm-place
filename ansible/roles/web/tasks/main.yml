---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - nginx
      - certbot
      - python3-certbot-dns-cloudflare
      - unzip
      - ufw
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable ufw
  community.general.ufw:
    state: enabled

- name: Allow inbound HTTP
  community.general.ufw:
    rule: allow
    direction: in
    port: "80"
    proto: tcp

- name: Allow inbound HTTPS
  community.general.ufw:
    rule: allow
    direction: in
    port: "443"
    proto: tcp

# - name: Allow outbound git protocol (port 9418)
#   community.general.ufw:
#     rule: allow
#     direction: out
#     port: "9418"
#     proto: tcp

- name: Ensure app runtime group exists
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true

- name: Ensure nginx user exists for app runtime and SSH deploy access
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    create_home: true
    home: /home/nginx
    shell: /bin/bash
    system: true

- name: Add NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource.gpg.key
    mode: "0644"

- name: Dearmor NodeSource GPG key
  ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/nodesource.gpg /tmp/nodesource.gpg.key
  args:
    creates: /usr/share/keyrings/nodesource.gpg

- name: Configure NodeSource repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    mode: "0644"
    content: |
      deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_major }}.x nodistro main
  notify: Update apt cache after NodeSource setup

- name: Install Node.js LTS
  ansible.builtin.apt:
    name: nodejs
    state: present

- name: Ensure nginx Ansible tmp dir exists
  ansible.builtin.file:
    path: /home/nginx/.ansible/tmp
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0700"

- name: Check Bun installation
  ansible.builtin.stat:
    path: /home/nginx/.bun/bin/bun
  register: web_bun_bin

- name: Install Bun latest
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://bun.sh/install | bash
  environment:
    HOME: /home/nginx
    BUN_INSTALL: /home/nginx/.bun
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ app_user }}"
  when: not web_bun_bin.stat.exists
  changed_when: true

- name: Ensure app root exists
  ansible.builtin.file:
    path: "{{ app_root }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Deploy systemd unit for Next.js
  ansible.builtin.template:
    src: rhythm-place.service.j2
    dest: /etc/systemd/system/rhythm-place.service
    mode: "0644"
  notify:
    - Daemon reload
    - Restart nextjs

- name: Ensure certbot webroot exists
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Nginx reverse proxy site
  ansible.builtin.template:
    src: nginx-stream.rhythm.place.conf.j2
    dest: /etc/nginx/sites-available/02-stream.rhythm.place.conf
    mode: "0644"
  notify: Reload nginx

- name: Configure primary Nginx app site
  ansible.builtin.template:
    src: nginx-rhythm.place.conf.j2
    dest: /etc/nginx/sites-available/03-rhythm.place.conf
    mode: "0644"
  notify: Reload nginx

- name: Enable Nginx stream site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/02-stream.rhythm.place.conf
    dest: /etc/nginx/sites-enabled/02-stream.rhythm.place.conf
    state: link
  notify: Reload nginx

- name: Enable primary Nginx app site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/03-rhythm.place.conf
    dest: /etc/nginx/sites-enabled/03-rhythm.place.conf
    state: link
  notify: Reload nginx

# - name: Disable default nginx site
#   ansible.builtin.file:
#     path: /etc/nginx/sites-enabled/default
#     state: absent
#   notify: Reload nginx

- name: Install certbot DNS provider credentials
  ansible.builtin.template:
    src: cloudflare.ini.j2
    dest: /etc/letsencrypt/cloudflare.ini
    owner: root
    group: root
    mode: "0600"

- name: Install Let's Encrypt deploy hook for Icecast and Nginx
  ansible.builtin.template:
    src: letsencrypt-deploy-hook.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/rhythm-place-cert-hook
    owner: root
    group: root
    mode: "0750"

