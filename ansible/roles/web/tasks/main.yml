---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - nginx
      - certbot
      - python3-certbot-dns-cloudflare
      - unzip
      - icecast2
      - liquidsoap
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure app runtime group exists
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true

- name: Ensure nginx user exists for app runtime
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    create_home: true
    home: /var/lib/nginx
    shell: /usr/sbin/nologin
    system: true

- name: Add NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource.gpg.key
    mode: "0644"

- name: Dearmor NodeSource GPG key
  ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/nodesource.gpg /tmp/nodesource.gpg.key
  args:
    creates: /usr/share/keyrings/nodesource.gpg

- name: Configure NodeSource repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    mode: "0644"
    content: |
      deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_major }}.x nodistro main
  register: nodesource_repo

- name: Update apt cache after NodeSource setup
  ansible.builtin.apt:
    update_cache: true
  when: nodesource_repo.changed

- name: Install Node.js LTS
  ansible.builtin.apt:
    name: nodejs
    state: present

- name: Check Bun installation
  ansible.builtin.stat:
    path: /usr/local/bin/bun
  register: bun_bin

- name: Install Bun latest
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://bun.sh/install | bash
    install -m 0755 /root/.bun/bin/bun /usr/local/bin/bun
  args:
    executable: /bin/bash
  when: not bun_bin.stat.exists

- name: Ensure app root exists
  ansible.builtin.file:
    path: "{{ app_root }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Checkout application repository
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_root }}"
    version: "{{ app_branch }}"
    force: true
  register: git_checkout
  notify: restart nextjs

- name: Install JS dependencies with Bun
  ansible.builtin.command: bun install --frozen-lockfile
  args:
    chdir: "{{ app_root }}"
  become_user: "{{ app_user }}"
  when: git_checkout.changed
  notify: restart nextjs

- name: Build Next.js app
  ansible.builtin.command: bun run build
  args:
    chdir: "{{ app_root }}"
  become_user: "{{ app_user }}"
  when: git_checkout.changed
  notify: restart nextjs

- name: Deploy systemd unit for Next.js
  ansible.builtin.template:
    src: rhythm-place.service.j2
    dest: /etc/systemd/system/rhythm-place.service
    mode: "0644"
  notify:
    - Daemon reload
    - Restart nextjs

- name: Ensure certbot webroot exists
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Nginx reverse proxy site
  ansible.builtin.template:
    src: nginx-rhythm-place.conf.j2
    dest: /etc/nginx/sites-available/rhythm.place.conf
    mode: "0644"
  notify: reload nginx

- name: Enable Nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/rhythm.place.conf
    dest: /etc/nginx/sites-enabled/rhythm.place.conf
    state: link
  notify: reload nginx

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Install certbot DNS provider credentials
  ansible.builtin.template:
    src: cloudflare.ini.j2
    dest: /etc/letsencrypt/cloudflare.ini
    owner: root
    group: root
    mode: "0600"

- name: Issue/Renew wildcard certificate
  ansible.builtin.command: >-
    certbot certonly
    --dns-cloudflare
    --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
    --non-interactive
    --agree-tos
    --email {{ letsencrypt_email }}
    --cert-name {{ letsencrypt_cert_name }}
    -d {{ letsencrypt_domains[0] }}
    -d {{ letsencrypt_domains[1] }}
  args:
    creates: "/etc/letsencrypt/live/{{ letsencrypt_cert_name }}/fullchain.pem"
  notify: reload nginx

- name: Ensure certbot auto-renew timer is enabled
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

# ─── Icecast2 ──────────────────────────────────────────────────────────────────

- name: Configure Icecast2
  ansible.builtin.template:
    src: icecast.xml.j2
    dest: /etc/icecast2/icecast.xml
    owner: root
    group: icecast
    mode: "0640"
  notify: restart icecast2

- name: Enable Icecast2 in /etc/default/icecast2
  ansible.builtin.lineinfile:
    path: /etc/default/icecast2
    regexp: '^ENABLE='
    line: 'ENABLE=true'
  notify: restart icecast2

- name: Ensure Icecast2 is enabled and running
  ansible.builtin.systemd:
    name: icecast2
    enabled: true
    state: started

# ─── Liquidsoap ────────────────────────────────────────────────────────────────

- name: Ensure Liquidsoap config directory exists
  ansible.builtin.file:
    path: /etc/liquidsoap
    state: directory
    owner: root
    group: liquidsoap
    mode: "0750"

- name: Ensure Liquidsoap playlist directory exists
  ansible.builtin.file:
    path: "{{ liquidsoap_playlist_dir }}"
    state: directory
    owner: liquidsoap
    group: liquidsoap
    mode: "0755"

- name: Ensure Liquidsoap log directory exists
  ansible.builtin.file:
    path: /var/log/liquidsoap
    state: directory
    owner: liquidsoap
    group: liquidsoap
    mode: "0755"

- name: Deploy Liquidsoap stream script
  ansible.builtin.template:
    src: liquidsoap-rhythm-place.liq.j2
    dest: /etc/liquidsoap/rhythm-place.liq
    owner: root
    group: liquidsoap
    mode: "0640"
  notify: Restart liquidsoap

- name: Deploy Liquidsoap systemd unit
  ansible.builtin.template:
    src: liquidsoap.service.j2
    dest: /etc/systemd/system/liquidsoap-rhythm-place.service
    mode: "0644"
  notify:
    - Daemon reload
    - Restart liquidsoap

- name: Ensure Liquidsoap service is enabled and running
  ansible.builtin.systemd:
    name: liquidsoap-rhythm-place
    enabled: true
    state: started

- name: Ensure Next.js service is enabled and running
  ansible.builtin.systemd:
    name: rhythm-place
    enabled: true
    state: started

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
