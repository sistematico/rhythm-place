#   ansible.builtin.systemd:
#     name: certbot.timer
#     enabled: true
#     state: started

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

- name: Ensure Next.js service is enabled and running
  ansible.builtin.systemd:
    name: rhythm-place
    enabled: true
    state: started

# ─── Sudoers ───────────────────────────────────────────────────────────────────

- name: Allow app user to run systemctl without password
  ansible.builtin.copy:
    dest: /etc/sudoers.d/{{ app_user }}-systemctl
    content: "{{ app_user }} ALL=(root) NOPASSWD: /usr/bin/systemctl\n"
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
