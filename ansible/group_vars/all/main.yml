---
app_name: rhythm-place
app_slogan: "A sua música, no seu rítmo"
app_domain: rhythm.place
app_user: nginx
app_group: nginx
app_root: /var/www/rhythm.place
app_repo: "https://github.com/sistematico/rhythm-place.git"
app_branch: main
app_port: 3030
nodejs_major: "24"

# DNS provider used by certbot DNS challenge.
# Valid values in this role: cloudflare
letsencrypt_dns_provider: cloudflare
letsencrypt_email: sistematico@gmail.com
letsencrypt_domains:
  - rhythm.place
  - "*.rhythm.place"

# First cert name must be rhythm.place so certbot stores certs in /etc/letsencrypt/live/rhythm.place/
letsencrypt_cert_name: rhythm.place

# ─── Icecast2 ──────────────────────────────────────────────────────────────────
icecast_hostname: stream.rhythm.place
icecast_port: 8000
icecast_tls_port: 8443
icecast_tls_certificate_path: /etc/icecast2/tls/rhythm.place.pem
icecast_max_clients: 100
icecast_max_sources: 5
icecast_location: Earth
icecast_admin_email: "{{ letsencrypt_email }}"

# ─── Liquidsoap ────────────────────────────────────────────────────────────────
liquidsoap_mount: /main
liquidsoap_playlist_dir: /var/music/rtm
