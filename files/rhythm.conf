server {
    listen 80;
    listen [::]:80;
    server_name rhythm.place www.rhythm.place;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 5m;
   
    ssl_certificate         /etc/letsencrypt/live/rhythm.place/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/rhythm.place/privkey.pem;

    server_name rhythm.place www.rhythm.place;

    #include conf.d/rtm-errors.conf;

    # Bloqueia acesso externo às rotas internas do Liquidsoap
    location /api/music {
        deny all;
        return 403;
    }

    # Serve static assets directly with Nginx
    location /_next/static {
        # Adjust the alias path to your project's .next/static directory
        alias /var/www/rhythm.place/.next/static;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    location / {
        # Reverse proxy for the Next.js server
        proxy_pass http://localhost:3070;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}