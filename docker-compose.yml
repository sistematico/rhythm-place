services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    restart: unless-stopped
    networks:
      - rhythm

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - icecast
    networks:
      - rhythm

  icecast:
    build:
      context: docker/icecast
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:-source_password}
      ICECAST_RELAY_PASSWORD: ${ICECAST_RELAY_PASSWORD:-relay_password}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:-admin_password}
    restart: unless-stopped
    networks:
      - rhythm

  liquidsoap:
    build:
      context: docker/liquidsoap
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:-source_password}
    restart: unless-stopped
    volumes:
      - ./docker/liquidsoap/rhythm-place.liq:/etc/liquidsoap/rhythm-place.liq:ro
      - ./playlists:/var/lib/liquidsoap/playlists:ro
      - ${MUSIC_DIR:-./music}:/music:ro
    depends_on:
      - icecast
    networks:
      - rhythm

networks:
  rhythm:
    driver: bridge
